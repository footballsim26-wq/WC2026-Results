name: Auto-Update Match Results

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch ESPN and update results
        run: python scripts/update_results.py

      - name: Commit and push if results changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results.json
          if git diff --staged --quiet; then
            echo "No changes — skipping commit"
          else
            LOCKED=$(python3 -c "import json; d=json.load(open('results.json')); print(d['totalLocked'])")
            git commit -m "Auto-update: ${LOCKED}/104 results locked [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
            echo "Pushed updated results.json"
          fi
